services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: unioncrest
    volumes:
      - dbdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    environment:
      PORT: "5000"
      DATABASE_URL: postgres://app:app@db:5432/unioncrest
    depends_on:
      - db
    ports:
      - "8082:5000"

volumes:
  dbdata:

